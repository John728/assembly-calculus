# Canonical unseen-list MLP baseline for the current paper workflow.
# This preserves the unseen MLP story in the new standardized output structure.
suite_name: unseen-mlp-baseline
output_dir: outputs/unseen-mlp-baseline
seeds: [1]
conditions:
  - list_type: Unseen
    N: 16
    num_train_lists: 8
    num_test_lists: 4
    k_train_min: 1
    k_train_max: 4
    k_test_min: 1
    k_test_max: 8
models:
  MLP:
    - model_name: MLP-01
      layers: 2
      hidden_dim: 64
      epochs: 6
      batch_size: 64
      lr: 0.001
      samples_per_list_train: 12
      samples_per_list_eval: 32
    - model_name: MLP-02
      layers: 4
      hidden_dim: 256
      epochs: 8
      batch_size: 64
      lr: 0.001
      samples_per_list_train: 12
      samples_per_list_eval: 32

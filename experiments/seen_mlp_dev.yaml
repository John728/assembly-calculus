suite_name: seen-mlp-dev
output_dir: outputs/experiments/seen-mlp-dev
seeds: [1]
conditions:
  - list_type: Seen
    N: 16
    num_train_lists: 12
    num_test_lists: 0
    k_train_min: 1
    k_train_max: 4
    k_test_min: 1
    k_test_max: 8
models:
  MLP:
    - model_name: MLP-01
      layers: 4
      hidden_dim: 512
      epochs: 20
      batch_size: 128
      lr: 0.001
      samples_per_list_train: 40
      samples_per_list_eval: 40
      patience: 6

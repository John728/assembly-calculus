suite_name: seen-ac-paper
output_dir: outputs/experiments/seen-ac-paper
seeds: [1, 2, 3]
trace_plots:
  enabled: true
  list_idx: 0
  start_node: 0
  hops: 4
conditions:
  - list_type: Seen
    N: 32
    num_train_lists: 8
    num_test_lists: 0
    k_train_min: 1
    k_train_max: 4
    k_test_min: 1
    k_test_max: 24
models:
  AC:
    - model_name: AC-01
      assembly_size: 24
      density: 0.15
      plasticity: 0.25
      presentation_rounds: 4
      transition_rounds: 10
      association_steps: 2
      samples_per_list_eval: 32
    - model_name: AC-02
      assembly_size: 32
      density: 0.2
      plasticity: 0.3
      presentation_rounds: 4
      transition_rounds: 12
      association_steps: 2
      samples_per_list_eval: 32

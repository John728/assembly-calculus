# Thesis-scale seen-list sweep.
# Intended for the larger machine: multi-seed, both AC and MLP, broader model grids.
suite_name: seen-large
output_dir: outputs/seen-large
seeds: [1, 2, 3, 4]
conditions:
  - list_type: Seen
    N: 32
    num_train_lists: 64
    num_test_lists: 0
    k_train_min: 1
    k_train_max: 8
    k_test_min: 1
    k_test_max: 24
models:
  MLP:
    - model_name: MLP-02
      layers: 4
      hidden_dim: 512
      epochs: 30
      batch_size: 256
      lr: 0.001
      samples_per_list_train: 32
      samples_per_list_eval: 64
    - model_name: MLP-03
      layers: 6
      hidden_dim: 1024
      epochs: 40
      batch_size: 256
      lr: 0.0005
      samples_per_list_train: 32
      samples_per_list_eval: 64
  AC:
    - model_name: AC-Seen-S
      assembly_size: 24
      density: 0.15
      plasticity: 0.25
      presentation_rounds: 4
      transition_rounds: 12
      association_steps: 2
      samples_per_list_eval: 64
    - model_name: AC-Seen-L
      assembly_size: 32
      density: 0.2
      plasticity: 0.3
      presentation_rounds: 6
      transition_rounds: 16
      association_steps: 3
      samples_per_list_eval: 64
